    <title>Preview Message</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            /* background:linear-gradient(135deg,#fff0f5,#fdf7ff); */
            background: linear-gradient(135deg, #FFF8F5, #fab4db);
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            transition: background-color 0.3s, color 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            /* font-family:system-ui; */
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 15vh;
            background-color: #810d47;
            /* margin:20px 100px; */
        }

        nav img {
            height: 100px;
            width: 100px;
        }

        nav a {
            text-decoration: none;
            color: #ec4899;
            background-color: white;
            padding: 2px;
            border-radius: 5px;
        }

        .logo {
            margin-left: 5%;
        }

        .link {
            margin-right: 5%;
        }

        .lovestack-card {
            margin-top: 20vh;
            max-width: 650px;
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.2);
            background: #FF5A8A;
            /* background: rgb(211, 200, 200); */
            animation: pop .6s ease;
        }

        @keyframes pop {
            from {
                transform: scale(.9);
                opacity: 0
            }

            to {
                transform: scale(1);
                opacity: 1
            }
        }

        .card-image {
            width: 100%;
            height: auto;
            overflow: hidden;
        }

        .card-image img {
            width: 100%;
            height: auto;
            object-fit: cover;
        }

        .card-text {
            padding: 20px;
            text-align: center;
        }

        .card-text h2 {
            margin: 2px 0;
        }

        .card-text h3 {
            margin: 2px 0;
            color: #e91e63;
        }

        .tone {
            display: inline-block;
            padding: 6px 14px;
            /* background:#ffe4ec; */
            background: linear-gradient(135deg, #FFF8F5, #fab4db);
            border-radius: 20px;
            font-size: 12px;
            margin: 8px 0;
        }

        .card-text p {
            text-align: justify;
            line-height: 2;
            padding: 0 10px;
            /* font-size: 16px; */
        }

        .brand {
            text-align: center;
            padding: 12px;
            font-weight: bold;
            /* background:#fafafa; */
            background: linear-gradient(135deg, #FFF8F5, #fab4db);
            border-top: 1px solid #eee;
            font-size: smaller;
            /* opacity: 0.6; */
        }

        /* ===== MAIN WRAPPER ===== */
        .preview-wrapper {
            min-height: 100vh;
            width: 100%;
            /* background: radial-gradient(circle at top, #1a1a24, #0b0b10); */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 15px;
            box-sizing: border-box;
        }

        /* ===== PREVIEW CONTAINER ===== */
        #preview {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 22px;
        }

        /* ===== ACTION BUTTONS ===== */
        .preview-actions {
            display: flex;
            gap: 14px;
            width: 100%;
            max-width: 420px;
        }

        /* ===== BUTTONS ===== */
        .preview-actions button {
            flex: 1;
            padding: 14px 16px;
            border-radius: 14px;
            border: none;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.25s ease;
            letter-spacing: 0.3px;
        }

        /* DOWNLOAD BUTTON */
        .preview-actions button:first-child {
            background: linear-gradient(135deg, #ff5fa2, #ff2f7d);
            color: white;
            box-shadow: 0 8px 18px rgba(255, 47, 125, 0.35);
        }

        /* WHATSAPP BUTTON */
        .preview-actions button:nth-child(2) {
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white;
            box-shadow: 0 8px 18px rgba(18, 140, 126, 0.35);
        }

        .preview-actions button:nth-child(3) {
            /* background: linear-gradient(135deg, #7c3aed, #5b21b6); */
            background: white;
            color: red;
            box-shadow: 0 8px 18px rgba(91, 33, 182, 0.35);
        }

        /* HOVER EFFECTS */
        .preview-actions button:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }

        /* ACTIVE */
        .preview-actions button:active {
            transform: scale(0.97);
        }

        /* ===== EXPORT MODE ===== */
        /* .export-mode body,
        .export-mode .preview-wrapper {
            background: #ffffff !important;
        } */

        .export-mode .lovestack-card {
            box-shadow: none !important;

        footer {

            width: 100%;

            text-align: center;

            }

        }

    <script>
        const stored = sessionStorage.getItem("lovestack_preview");

        let data = null;   // 🔥 GLOBAL DATA ACCESS

        if (stored) {
            try {
                data = JSON.parse(stored);

                let cardHTML = `
          <div class="lovestack-card ${data.frame || ""} ${data.layout || ""}" id="cardToDownload">
        `;

                /* ===== IMAGE SECTION ===== */
                if (data.image) {
                    cardHTML += `
              <div class="card-image">
                <img src="${data.image}">
              </div>
            `;
                }

                /* ===== TEXT SECTION ===== */
                cardHTML += `
          <div class="card-text">
            ${data.sender ? `<h4>From: ${data.sender}</h4>` : ""}
            ${data.recipient ? `<h2>To: ${data.recipient}</h2>` : ""}
            ${data.occasion ? `<h4>Happy ${data.occasion}</h4>` : ""}
            ${data.theme ? `<span class="tone">${data.theme}</span>` : ""}
            <p>${data.msg || ""}</p>
          </div>

          <div class="brand">LoveStack 💖</div>
          </div>
        `;

                document.getElementById("preview").innerHTML = cardHTML;

            } catch (e) {
                document.body.innerHTML = "Invalid preview data";
            }
        } else {
            document.body.innerHTML = "No preview data found";
        }

        //    whatsapp
        function shareWhatsApp() {
            if (!data) return;

            const text = ` LoveStack Message

${data.recipient ? "To: " + data.recipient : ""}
${data.sender ? "From: " + data.sender : ""}

${data.msg}


Create yours on LoveStack 💌`;

            const url = `https://wa.me/?text=${encodeURIComponent(text)}`;
            window.open(url, "_blank");
        }

        function downloadCardPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF("p", "mm", [200, 260]);

            const pageWidth = doc.internal.pageSize.getWidth();
            const pageHeight = doc.internal.pageSize.getHeight();

            // === BACKGROUND COLOR ===
            doc.setFillColor(255, 248, 245); // pastel pink
            doc.rect(0, 0, pageWidth, pageHeight, "F");

            // === BORDER FRAME ===
            doc.setDrawColor(250, 180, 219); // soft pink border
            doc.setLineWidth(2);
            doc.roundedRect(10, 10, pageWidth - 20, pageHeight - 10, 12, 12, "S");

            let yPos = 30;

            // === IMAGE WITH ROUNDED CORNERS + SHADOW ===
            if (data.image) {
                const img = new Image();
                img.crossOrigin = "anonymous";
                img.src = data.image;

                img.onload = function () {
                    const imgWidth = 130;
                    const imgHeight = 100;
                    const xCenter = (pageWidth - imgWidth) / 2;

                    // Drop shadow rectangle (slightly offset)
                    doc.setFillColor(200, 200, 200); // light gray shadow
                    doc.roundedRect(xCenter + 3, yPos + 3, imgWidth, imgHeight, 20, 10, "F");

                    // Rounded white background for the image
                    doc.setFillColor(255, 255, 255);
                    doc.roundedRect(xCenter, yPos, imgWidth, imgHeight, 10, 10, "F");

                    // Place the image
                    doc.addImage(img, "JPEG", xCenter, yPos, imgWidth, imgHeight);

                    yPos += imgHeight + 20;
                    addTextContent(doc, yPos, pageWidth, pageHeight);
                };
            } else {
                addTextContent(doc, yPos, pageWidth, pageHeight);
            }
        }

        function addTextContent(doc, yPos, pageWidth, pageHeight) {
            if (data.sender) {
                doc.setFont("helvetica", "bold");
                doc.setFontSize(14);
                doc.text(`From: ${data.sender}`, 20, yPos);
                yPos += 12;
            }

            if (data.recipient) {
                doc.setFontSize(16);
                doc.text(`To: ${data.recipient}`, 20, yPos);
                yPos += 15;
            }

            if (data.occasion) {
                doc.setFont("helvetica", "italic");
                doc.setFontSize(14);
                doc.text(`Happy ${data.occasion}`, 20, yPos);
                yPos += 15;
            }

            doc.setFont("helvetica", "normal");
            doc.setFontSize(12);
            doc.text(data.msg || "", 20, yPos, { maxWidth: pageWidth - 40 });
            yPos += 40;

            doc.setFontSize(10);
            doc.text("LoveStack", pageWidth / 2, pageHeight - 5, { align: "center" });

            doc.save("lovestack-card.pdf");
        }

        function generatePublicLink() {
            const stored = sessionStorage.getItem("lovestack_preview");
            if (!stored) {
                alert("No card data found");
                return;
            }

            const encoded = encodeURIComponent(stored);
            const link = `${window.location.origin}/preview.html?data=${encoded}`;

            document.getElementById("shareLinkInput").value = link;
            document.getElementById("shareLinkBox").style.display = "block";
        }

        function copyShareLink() {
            const input = document.getElementById("shareLinkInput");
            input.select();
            input.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(input.value);
            alert("Link copied 💖");
        }
