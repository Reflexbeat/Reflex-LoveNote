    <section class="hero">
        <h1>Create Your Message!</h1>
        <!-- <p><span>Simply put your emotions & feelings to writting.</span></p> -->
    </section>
    <section class="form-container">

        <form action="" method="post">
            <div class="forms">
                <div class="f1">
                    <label for="sender" class="l1">From<span>*</span></label> <br>
                    <input type="text" name="sender" id="sender" required>
                </div>
                <div class="f1">
                    <label for="recipient" class="l2">To<span>*</span></label> <br>
                    <input type="text" name="recipient" id="recipient" required>
                </div>

            </div>
            <div class="forms">
                <div class="f1">
                    <label for="occasion" class="l3">Occasion<span>*</span></label> <br>
                    <select name="occasion" id="occasion" class="select">
                        <option value="">All Occasions</option>
                        <option value="Valentine">Valentine</option>
                        <option value="Birthday">Birthday</option>
                        <option value="Anniversary">Anniversary</option>
                        <option value="Graduation">Graduation</option>
                        <option value="New-year">New-Year</option>
                        <option value="Christmas">Christmas</option>
                        <option value="Mother's Day">Mother’s Day</option>
                        <option value="Father's Day">Father’s Day</option>
                        <option value="Easter">Easter</option>
                        <option value="Eid">Eid-Mubarak</option>
                        <option value="Marriage">Marriage</option>
                        <option value="Children's Day">Children’s Day</option>
                    </select>
                </div>
                <div class="f1">
                    <label for="theme" class="l4">Tone<span>*</span></label> <br>
                    <select name="theme" id="theme" class="select" required>
                        <option value="">All Tones</option>
                        <option value="Romantic">Romantic</option>
                        <option value="flirting">Flirting</option>
                        <option value="Celebratory">Celebratory</option>
                        <option value="Friendly">Friedly</option>
                        <option value="Congratulatory">Congratulatory</option>
                        <option value="gratitude">Gratitude</option>
                        <option value="apology">Apology</option>
                        <option value="encouragement">Encouragement</option>
                        <option value="Funny">Funny/Sarcastic</option>
                    </select>
                </div>
            </div>
            <div class="image-upload-section">
                <label class="upload-label">Add a Picture (optional) 💕</label>

                <div class="upload-box" onclick="triggerImageUpload()">
                    <input type="file" id="imageInput" accept="image/*" hidden>

                    <div class="upload-placeholder" id="uploadPlaceholder">
                        <span>📷 Tap to upload image</span>
                        <small>JPG, PNG supported</small>
                    </div>
                    <img id="previewImage" class="preview-image"/>
                </div>
            </div>
            <label for="text" class="l5">Enter Your Message<span>*</span></label> <br>
            <textarea name="" id="message" required></textarea>
            <div class="btn2">
                <!-- <button type="button" onclick="previewMessage()">Preview</button> -->
                <button type="button" onclick="openPreview()">Preview</button>
                <button type="button" onclick="generateLink()">Generate Link</button>
            </div>
        </form>
        <div id="preview"></div>
        <div id="link"></div>
        <div id="share-buttons" style="margin-top:10px; display:none;">
            <!-- <button type="button" onclick="shareWhatsApp()">Share on WhatsApp</button>  -->
            <!-- <button type="button" onclick="shareFacebook()">Share on Facebook</button>  -->
            <!-- <button type="button" onclick="shareTwitter()">Share on Twitter</button>  -->
            <button type="button" onclick="copyLink()">Copy Link</button>
        </div>
    </section>
